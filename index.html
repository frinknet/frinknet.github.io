<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRINKnet</title>
<link rel="icon" type="image/png" href="frink.png">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
  }

  img {
    user-drag: none;
    -webkit-user-drag: none;
  }

  html, body {
    overflow: hidden;
  }

  body {
    background: #070b0d;
    color: #c8b8a0;
    font-family: 'Courier New', Courier, monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  .bg-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: bgZoomIn 3s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
  }

  #network-canvas {
    width: 100%;
    height: 100%;
  }

  @keyframes bgZoomIn {
    0% {
      transform: scale(0.14);
      opacity: 0.3;
    }
    100% {
      transform: scale(0.85);
      opacity: 1;
    }
  }

  .content-container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    width: 100%;
    animation: contentZoomOut 2.5s cubic-bezier(0.16, 1, 0.3, 1) 0.9s both;
  }

  @keyframes contentZoomOut {
    0% {
      opacity: 0;
      filter: blur(4px);
      transform: scale(1.15);
    }
    50% {
      opacity: 1;
      filter: blur(0);
    }
    100% {
      opacity: 1;
      filter: blur(0);
      transform: scale(1);
    }
  }

  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 2rem;
    padding-bottom: 12vh;
  }

  .top-line {
    margin-bottom: 2rem;
    text-align: center;
  }

  .top-line ul {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0;
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    letter-spacing: 0.10em;
    text-transform: lowercase;
  }

  .top-line li + li::before {
    content: '·';
    color: #8a7e6b;
    margin: 0 0.5em;
  }

  .top-line a {
    color: #f5ebe0;
    text-decoration: none;
    transition: color 0.3s ease;
  }

  .top-line a:hover {
    color: #ffffff;
  }

  .mobile-nav-row {
    display: none;
  }

  .mascot-image {
    min-height: 50vh;
    min-width: 50vh;
    max-width: 80vw;
    max-height: 60vh;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 0 40px rgba(200, 130, 60, 0.15));
    opacity: 0.80;
  }

  .mascot-figure {
    position: relative;
    display: flex;
    justify-content: center;
  }

  .bottom-line {
    font-size: clamp(1.25rem, 3.4vw, 2.15rem);
    letter-spacing: 0.15em;
    color: #f5ebe0;
    margin-top: clamp(1rem, 5vw, 2.5rem);
    text-align: center;
    font-weight: 300;
    opacity: 0.85;
    transform: translateX(0);
    transition: opacity 0.45s ease, transform 0.45s ease;
  }

  .bottom-line.fade-out {
    opacity: 0.15;
    transform: translateX(-1rem);
  }

  .bottom-line.fade-in {
    opacity: 0.85;
    transform: translateX(0);
  }

  .bottom-line::after {
    content: '_';
    display: inline-block;
    margin-left: 0.08em;
    color: #c88246;
    opacity: 0.55;
    animation: blink 2.2s steps(2, start) infinite;
  }

  .letter {
    display: inline-block;
    min-width: 0.12em;
    transition: color 8.5s ease, opacity 8.5s ease;
  }

  .letter.fading {
    color: rgba(200, 130, 70, 0);
    opacity: 0;
  }

  @keyframes blink {
    0%, 45% { opacity: 0.55; }
    46%, 100% { opacity: 0; }
  }

  @media (max-width: 700px) {
    .content {
      padding-bottom: 16vh;
    }

    .mascot-image {
      min-height: 42vh;
      min-width: 42vh;
      max-width: 78vw;
      max-height: 52vh;
    }

    .top-line {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 5;
      margin: 0;
      padding: 1.3rem max(0.75rem, env(safe-area-inset-left)) calc(1.3rem + env(safe-area-inset-bottom)) max(0.75rem, env(safe-area-inset-right));
      background: transparent;
      border-top: 0;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .top-line::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: linear-gradient(to bottom, rgba(10, 10, 12, 0), rgba(10, 10, 12, 0.88));
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, #000 22%, #000 100%);
      mask-image: linear-gradient(to bottom, transparent 0%, #000 22%, #000 100%);
    }

    .top-line > nav {
      position: relative;
      z-index: 1;
    }

    .top-line ul {
      display: none;
    }

    .mobile-nav-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: center;
      gap: 0;
    }

    .top-line li + li::before {
      display: none;
    }

    .top-line a {
      display: block;
      padding: 0.45rem 0.35rem;
    }

    .mobile-nav-row > a {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .mobile-nav-help {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 4.4rem;
      height: 2.35rem;
      margin: 0 auto;
      border: 1px solid rgba(10, 10, 12, 0.35);
      border-radius: 999px;
      background: #f5ebe0;
      color: #0a0a0c;
      font: inherit;
      line-height: 1;
    }
  }
</style>
</head>
<body>

<div class="bg-container">
  <canvas id="network-canvas" aria-hidden="true" role="presentation"></canvas>
</div>

<main class="content-container">
  <section class="content" aria-labelledby="bottom-title">
    <header class="top-line">
      <nav aria-label="Main navigation">
        <ul>
          <li><a href="/tools/">tools</a></li>
          <li><a href="/libs/">libs</a></li>
          <li><a href="/news/">news</a></li>
          <li><a href="/about/">about</a></li>
          <li><a href="/docs/">docs</a></li>
        </ul>
        <div class="mobile-nav-row" aria-label="Mobile navigation">
          <a href="/tools/">tools</a>
          <a href="/news/">news</a>
          <button class="mobile-nav-help" type="button" aria-label="Ask FRINKnet">ask!</button>
          <a href="/libs/">libs</a>
          <a href="/docs/">docs</a>
        </div>
      </nav>
    </header>
    <figure class="mascot-figure">
      <img src="frink.png" alt="FRINKnet and friends" class="mascot-image" draggable="false">
    </figure>
    <h1 class="bottom-line" id="bottom-title"></h1>
  </section>
</main>

<script>
  const titles = [
    'godfather of system resources',
    'sensei of the inter-webs',
    'scripted minimalist',
    'intelligent beyond artificial',
    'architects of elegance',
    'machine whisperer',
    'gardian of clean code',
    'open source oracle',
    'cryptographic chiefton',
    'memory stack mastermind',
    'weaver of wasm dreams',
    'sage of embedded systems',
    'poet of pixelization',
    'making servers purr',
    'fashionably functional',
    'lord of the lean build',
    'wizard of websockets',
    'faust and festidious',
    'realtime reliability',
    'pedantic persistence',
  ];

  document.addEventListener('selectstart', (event) => {
    event.preventDefault();
  });

  document.addEventListener('dragstart', (event) => {
    if (event.target instanceof HTMLAnchorElement) {
      event.preventDefault();
    }
  });

  const titleEl = document.getElementById('bottom-title');
  const initialText = titles[Math.floor(Math.random() * titles.length)];
  let titleIndex = titles.indexOf(initialText);
  titleEl.textContent = initialText;
  titleEl.innerHTML = '';
  for (const char of initialText) {
    const span = document.createElement('span');
    span.className = 'letter';
    span.textContent = char === ' ' ? '\u00a0' : char;
    titleEl.appendChild(span);
  }

  const recentTitles = [];
  recentTitles.push(titleIndex);

  const BACKSPACE_REMAINING_CHARS = 10;
  const BACKSPACE_START_DELAY_MS = 1650;

  let charIndex = initialText.length;
  let fadeIndex = 0;
  renderTitle(0, charIndex);
  let pauseTimer = null;
  let backspaceTimer = null;
  let backspacing = false;

  function clearBackspaceTimer() {
    if (backspaceTimer) {
      clearTimeout(backspaceTimer);
      backspaceTimer = null;
    }
  }

  function backspaceStep() {
    const letters = titleEl.querySelectorAll('.letter');
    if (letters.length > 0) {
      letters[letters.length - 1].remove();
      const remaining = titleEl.querySelectorAll('.letter');
      if (remaining.length > 0) {
        backspaceTimer = setTimeout(backspaceStep, 28 + Math.random() * 18);
      } else {
        finishTitle();
      }
    }
  }

  function startBackspacingIfNeeded() {
    const letters = titleEl.querySelectorAll('.letter');
    if (!backspacing && fadeIndex >= Math.max(0, letters.length - BACKSPACE_REMAINING_CHARS)) {
      backspacing = true;
      backspaceTimer = setTimeout(backspaceStep, BACKSPACE_START_DELAY_MS);
    }
  }

  function pickNextTitle() {
    let nextIndex;
    do {
      nextIndex = Math.floor(Math.random() * titles.length);
    } while (titles.length > 3 && recentTitles.includes(nextIndex));

    titleIndex = nextIndex;
    recentTitles.push(nextIndex);
    while (recentTitles.length > 3) {
      recentTitles.shift();
    }
  }

  function renderTitle(fadeCount, visibleCount) {
    const title = titles[titleIndex];
    titleEl.innerHTML = '';
    for (let i = 0; i < visibleCount; i++) {
      const span = document.createElement('span');
      span.className = i < fadeCount ? 'letter fading' : 'letter';
      span.textContent = title[i] === ' ' ? '\u00a0' : title[i];
      titleEl.appendChild(span);
    }
  }

  function finishTitle() {
    clearBackspaceTimer();
    if (pauseTimer) {
      clearTimeout(pauseTimer);
      pauseTimer = null;
    }
    titleEl.textContent = '';
    pickNextTitle();
    charIndex = 0;
    fadeIndex = 0;
    backspacing = false;
    pauseTimer = setTimeout(typeTitle, 1600);
  }

  function fadeAndBackspaceTitle() {
    const letters = titleEl.querySelectorAll('.letter');

    if (letters.length === 0) {
      finishTitle();
      return;
    }

    startBackspacingIfNeeded();

    if (fadeIndex < letters.length) {
      letters[fadeIndex].classList.add('fading');
      fadeIndex++;
      pauseTimer = setTimeout(fadeAndBackspaceTitle, 180 + Math.random() * 80);
    }
  }

  function typeTitle() {
    const title = titles[titleIndex];

    charIndex++;
    renderTitle(0, charIndex);

    if (charIndex >= title.length) {
      pauseTimer = setTimeout(fadeAndBackspaceTitle, 800);
    } else {
      pauseTimer = setTimeout(typeTitle, 21 + Math.random() * 10);
    }
  }

  pauseTimer = setTimeout(fadeAndBackspaceTitle, 800);
</script>
<script src="scripts/bg.js" defer></script>
</body>
</html>
