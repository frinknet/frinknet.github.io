<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRINKnet</title>
<link rel="icon" type="image/png" href="frink.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0c;
    color: #c8b8a0;
    font-family: 'Courier New', Courier, monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  #network-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    width: 100%;
    padding: 2rem;
  }

  .top-line {
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    letter-spacing: 0.35em;
    text-transform: lowercase;
    color: #f5ebe0;
    margin-bottom: 2rem;
    text-align: center;
  }

  .top-line a {
    color: #f5ebe0;
    text-decoration: none;
    transition: color 0.3s ease;
  }

  .top-line a:hover {
    color: #ffffff;
  }

  .separator {
    color: #8a7e6b;
    margin: 0 0.5em;
  }

  .hero-image {
    min-height: 50vh;
    min-width: 50vh;
    max-width: 80vw;
    max-height: 70vh;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 0 40px rgba(200, 130, 60, 0.15));
  }

  .bottom-line {
    font-size: clamp(1.5rem, 4vw, 3rem);
    letter-spacing: 0.15em;
    color: #f5ebe0;
    margin-top: 2.5rem;
    text-align: center;
    font-weight: 300;
  }
</style>
</head>
<body>

<canvas id="network-canvas"></canvas>

<div class="content">
  <div class="top-line">
    <a href="/libs/">libs</a><span class="separator">·</span>
    <a href="/apps/">apps</a><span class="separator">·</span>
    <a href="/tools/">tools</a><span class="separator">·</span>
    <a href="/docs/">docs</a>
  </div>
  <img src="frink.png" alt="FRINKnet and friends" class="hero-image">
  <div class="bottom-line">the godfather of system resources</div>
</div>

<script>
(() => {
  const canvas = document.getElementById('network-canvas');
  const ctx = canvas.getContext('2d');

  const NODE_COLORS = [
    [200, 130, 70],
    [180, 110, 60],
    [220, 160, 100],
    [160, 140, 120],
    [140, 130, 110],
    [100, 90, 80],
  ];

  let nodes = [];
  let w, h, dpr;

  const DENSITY = 20000;

  function resize() {
    dpr = window.devicePixelRatio || 1;
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    buildNodes();
  }

  function buildNodes() {
    const count = Math.max(50, Math.floor((w * h) / DENSITY));
    nodes = [];
    for (let i = 0; i < count; i++) {
      nodes.push({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        r: 2 + Math.random() * 3,
        color: NODE_COLORS[Math.floor(Math.random() * NODE_COLORS.length)],
        phase: Math.random() * Math.PI * 2,
      });
    }
  }

  const CONNECT_DIST = 280;
  const CONNECT_DIST_SQ = CONNECT_DIST * CONNECT_DIST;

  let time = 0;

  function radialFade(x, y, maxFade) {
    const cx = w / 2;
    const cy = h / 2;
    const dist = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
    const maxDim = Math.max(w, h);
    return Math.max(0, 1 - (dist / (maxDim / 2)) * maxFade);
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    time += 0.008;

    for (let i = 0; i < nodes.length; i++) {
      const a = nodes[i];
      a.x += a.vx;
      a.y += a.vy;
      if (a.x < 0) a.x += w;
      if (a.x > w) a.x -= w;
      if (a.y < 0) a.y += h;
      if (a.y > h) a.y -= h;

      for (let j = i + 1; j < nodes.length; j++) {
        const b = nodes[j];
        const dx = a.x - b.x;
        const dy = a.y - b.y;
        const distSq = dx * dx + dy * dy;
        if (distSq < CONNECT_DIST_SQ) {
          const alpha = (1 - distSq / CONNECT_DIST_SQ) * 0.25;
          const fade = radialFade((a.x + b.x) / 2, (a.y + b.y) / 2, 0.5);
          const pulse = 0.8 + 0.2 * Math.sin(time + a.phase);
          const r = Math.round((a.color[0] + b.color[0]) / 2);
          const g = Math.round((a.color[1] + b.color[1]) / 2);
          const bl = Math.round((a.color[2] + b.color[2]) / 2);
          ctx.strokeStyle = `rgba(${r},${g},${bl},${alpha * pulse * fade})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }

    for (const n of nodes) {
      const pulse = 0.6 + 0.4 * Math.sin(time * 1.5 + n.phase);
      const fade = radialFade(n.x, n.y, 0.5);
      ctx.fillStyle = `rgba(${n.color[0]},${n.color[1]},${n.color[2]},${(0.4 + 0.2 * pulse) * fade})`;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  draw();
})();
</script>
</body>
</html>
